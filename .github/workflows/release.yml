name: Release

# Bundles CLAP + VST3 + standalone per platform and attaches them to a GitHub
# release. Trigger: push a tag like `v0.1.0`, or run manually (artifacts only).
# macOS is a universal (arm64 + x86_64) build; all builds are unsigned.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  bundle:
    name: Bundle (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, name: macos }
          - { os: ubuntu-latest, name: linux }
          - { os: windows-latest, name: windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libgl-dev libjack-jackd2-dev libx11-xcb-dev libxcb1-dev
          libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev libxkbcommon-dev
          libxcb-shape0-dev libxcb-xfixes0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Bundle
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
            cargo xtask bundle-universal trafalgar --release
          else
            cargo xtask bundle trafalgar --release
          fi

      - name: Package
        shell: bash
        run: |
          cd target/bundled
          tar -czf "../../trafalgar-${{ matrix.name }}.tar.gz" *

      - uses: actions/upload-artifact@v4
        with:
          name: trafalgar-${{ matrix.name }}
          path: trafalgar-${{ matrix.name }}.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: trafalgar-${{ matrix.name }}.tar.gz
