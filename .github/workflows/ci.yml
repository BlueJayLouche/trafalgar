name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # System deps for building the nih_plug_vizia (baseview) editor on Linux.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libgl-dev libjack-jackd2-dev libx11-xcb-dev libxcb1-dev
          libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev libxkbcommon-dev
          libxcb-shape0-dev libxcb-xfixes0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo build --workspace --release
